server { listen 80; server_name _; root /usr/share/nginx/html; index index.html;
  server_tokens off;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  access_log /logs/access.log combined;
  error_log /logs/error.log warn;
  location /api/ { client_max_body_size 2m; proxy_pass http://backend-api:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
  location /health { return 200 'ok'; add_header Content-Type text/plain; }
  location / { try_files $uri /index.html; }
}
